<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriCoach — Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .topbar { background: var(--teal); border-bottom: none; }
    .topbar-brand { color: #fff; }
    .topbar-brand .dot { background: rgba(255,255,255,0.7); }
    .topbar-user { color: rgba(255,255,255,0.8); }
    .hero { padding-top: 8px; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 500;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    @media (min-width: 640px) {
      .modal-backdrop { align-items: center; padding: 24px; }
    }
    .modal {
      background: var(--surface);
      width: 100%;
      max-width: 560px;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 36px;
      max-height: 90vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (min-width: 640px) {
      .modal { border-radius: 20px; padding: 32px; }
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 17px; font-weight: 700; }
  </style>
</head>
<body data-page="dashboard">
  <div class="page-wrapper">

    <nav class="topbar">
      <a class="topbar-brand" href="nutritionist.html">
        <div class="dot"></div>
        NutriCoach
      </a>
      <div class="topbar-right">
        <span class="topbar-user" id="topbar-user"></span>
        <button class="btn btn-sm btn-ghost" id="logout-btn"
          style="color:rgba(255,255,255,0.85);min-height:36px">Sign out</button>
      </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
      <h1 class="hero-title">Dashboard</h1>
      <p class="hero-sub">Manage your clients and meal plan templates.</p>
      <div class="hero-stats" style="grid-template-columns:1fr 1fr 1fr;max-width:420px">
        <div class="hero-stat">
          <div class="hero-stat-label">Clients</div>
          <div class="hero-stat-value" id="stat-clients">0</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">Upcoming Appts</div>
          <div class="hero-stat-value" id="stat-upcoming-appts">0</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">Check-ins Today</div>
          <div class="hero-stat-value" id="stat-today-checkins">0</div>
        </div>
      </div>
    </div>

    <div class="main-content">
      <!-- Tabs -->
      <div data-tabs="dash">
        <div class="tabs">
          <button class="tab active" data-tab="clients">Clients</button>
          <button class="tab" data-tab="appointments">Appointments</button>
          <button class="tab" data-tab="templates">Meal Templates</button>
        </div>

        <!-- Clients tab -->
        <div class="tab-panel active tab-body" data-tab-group="dash" data-tab="clients">
          <div class="section">
            <div class="client-list" id="client-list"></div>
          </div>
        </div>

        <!-- Appointments tab -->
        <div class="tab-panel tab-body" data-tab-group="dash" data-tab="appointments">
          <div class="section">
            <div class="section-header">
              <div style="display:flex;gap:6px">
                <button class="btn btn-sm btn-secondary appt-filter-btn" data-filter="upcoming">Upcoming</button>
                <button class="btn btn-sm btn-ghost appt-filter-btn" data-filter="all">All</button>
                <button class="btn btn-sm btn-ghost appt-filter-btn" data-filter="past">Past</button>
              </div>
              <button class="btn btn-sm btn-primary" id="new-appt-btn">+ New Appointment</button>
            </div>
            <div id="appointments-list"></div>
          </div>
        </div>

        <!-- Templates tab -->
        <div class="tab-panel tab-body" data-tab-group="dash" data-tab="templates">
          <div class="section">
            <div class="section-header">
              <span class="section-title">Meal Plan Templates</span>
              <button class="btn btn-sm btn-primary" id="new-template-btn">+ New Template</button>
            </div>
            <div id="template-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <a class="bottom-nav-item active" href="nutritionist.html">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Clients</span>
      </a>
      <button class="bottom-nav-item" onclick="logout()">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        <span>Sign out</span>
      </button>
    </nav>
  </div>

  <!-- Appointment modal -->
  <div class="modal-backdrop" id="appointment-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Schedule Appointment</span>
        <button class="btn btn-sm btn-ghost" id="close-appt-modal-btn">✕</button>
      </div>
      <form id="appointment-form">
        <div class="form-group">
          <label for="appt-client">Client</label>
          <select id="appt-client" required>
            <option value="">Select a client…</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group" style="margin-bottom:0">
            <label for="appt-date">Date</label>
            <input type="date" id="appt-date" required>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label for="appt-time">Time</label>
            <input type="time" id="appt-time" required>
          </div>
        </div>
        <div class="form-group" style="margin-top:22px">
          <label for="appt-type">Type</label>
          <select id="appt-type">
            <option value="follow-up">Follow-up</option>
            <option value="consultation">Initial Consultation</option>
            <option value="review">Progress Review</option>
            <option value="goal-setting">Goal Setting</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="appt-notes">Notes (optional)</label>
          <textarea id="appt-notes" rows="2" placeholder="Agenda, topics to discuss…"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Schedule Appointment</button>
      </form>
    </div>
  </div>

  <!-- Template editor modal -->
  <div class="modal-backdrop" id="template-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Meal Plan Template</span>
        <button class="btn btn-sm btn-ghost" id="close-modal-btn">✕</button>
      </div>
      <form id="template-form">
        <div class="form-group">
          <label for="tpl-name">Template name</label>
          <input type="text" id="tpl-name" placeholder="e.g. Weight Loss Starter" required>
        </div>
        <div class="form-group">
          <label for="tpl-desc">Description</label>
          <input type="text" id="tpl-desc" placeholder="Short description (optional)">
        </div>
        <hr class="divider">
        <div id="tpl-meals"></div>
        <hr class="divider">
        <div class="form-group">
          <label for="tpl-notes">Plan notes</label>
          <textarea id="tpl-notes" rows="2" placeholder="Calorie targets, timing…"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Save Template</button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/nutritionist.js"></script>
</body>
</html>
