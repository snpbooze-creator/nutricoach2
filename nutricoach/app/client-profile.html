<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Client Profile — NutriCoach</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="apple-touch-icon" href="../icon.svg">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1CBFA2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NutriCoach">
</head>
<body data-page="profile">
  <div class="page-wrapper" style="padding-bottom:0">

    <!-- Teal profile hero (replaces topbar on this page) -->
    <div class="profile-hero">
      <a href="nutritionist.html" class="back-link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        All clients
      </a>
      <div class="profile-hero-inner">
        <div class="profile-avatar" id="client-avatar"></div>
        <div>
          <div class="profile-hero-name" id="client-name">Loading…</div>
          <div class="profile-hero-goal" id="client-goal"></div>
        </div>
        <!-- topbar-user shown inside hero on desktop -->
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
          <span id="topbar-user" style="font-size:12px;color:rgba(255,255,255,0.7);display:none"></span>
          <button class="btn btn-sm" id="account-btn"
            style="background:rgba(255,255,255,0.18);color:#fff;border:none;min-height:34px;padding:0 10px" title="Account settings">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
          <button class="btn btn-sm" id="logout-btn"
            style="background:rgba(255,255,255,0.18);color:#fff;border:none;min-height:34px">Sign out</button>
        </div>
      </div>
    </div>

    <div class="main-content">
      <!-- Tabs -->
      <div data-tabs="profile">
        <div class="tabs" style="padding-top:8px">
          <button class="tab active" data-tab="overview">Overview</button>
          <button class="tab" data-tab="meal-plan">Meal Plan</button>
          <button class="tab" data-tab="checkins">Check-ins</button>
          <button class="tab" data-tab="progression">Progression</button>
          <button class="tab" data-tab="notes">Notes</button>
        </div>

        <!-- Overview -->
        <div class="tab-panel active tab-body" data-tab-group="profile" data-tab="overview">
          <div class="card">
            <div class="card-header"><div class="card-title">Client Profile</div></div>
            <div id="profile-details"></div>
          </div>
        </div>

        <!-- Meal Plan Editor -->
        <div class="tab-panel tab-body" data-tab-group="profile" data-tab="meal-plan">
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">Meal Plan</div>
                <div class="card-subtitle">Edit and save to update the client's plan</div>
              </div>
            </div>
            <div id="meal-plan-editor"></div>
          </div>
        </div>

        <!-- Check-ins -->
        <div class="tab-panel tab-body" data-tab-group="profile" data-tab="checkins">
          <div class="card">
            <div class="card-header"><div class="card-title">Check-in History</div></div>
            <div id="checkin-history"></div>
          </div>
        </div>

        <!-- Progression -->
        <div class="tab-panel tab-body" data-tab-group="profile" data-tab="progression">
          <div id="progression-section"></div>
        </div>

        <!-- Notes -->
        <div class="tab-panel tab-body" data-tab-group="profile" data-tab="notes">
          <div class="card" style="max-width:560px">
            <div class="card-header"><div class="card-title">Client Notes</div></div>
            <div class="form-group">
              <label for="client-notes">Internal notes (only visible to you)</label>
              <textarea id="client-notes" rows="6" placeholder="Observations, adjustments, reminders…"></textarea>
            </div>
            <button class="btn btn-primary" id="save-notes-btn">Save Notes</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- NEW FEATURE — Recipe picker modal (used when adding from recipe in meal editor) -->
  <div id="recipe-picker-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:600;align-items:flex-end;justify-content:center">
    <div style="background:var(--surface);width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:80vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:17px;font-weight:700">Choose a Recipe</span>
        <button class="btn btn-sm btn-ghost" id="close-recipe-picker-btn">✕</button>
      </div>
      <div id="recipe-picker-list"></div>
    </div>
  </div>

  <!-- Template picker modal -->
  <div id="template-picker-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:flex-end;justify-content:center">
    <div style="background:#fff;width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:80vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:17px;font-weight:700">Choose a Template</span>
        <button class="btn btn-sm btn-ghost" id="close-picker-btn">✕</button>
      </div>
      <div id="template-picker-list"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/nutritionist.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const name = document.getElementById('client-name').textContent;
      const av = document.getElementById('client-avatar');
      if (av && name && name !== 'Loading…') av.textContent = getInitials(name);
      // Show user label on desktop
      const userEl = document.getElementById('topbar-user');
      if (userEl && window.innerWidth >= 640) userEl.style.display = 'block';
    });
  </script>
</body>
</html>
